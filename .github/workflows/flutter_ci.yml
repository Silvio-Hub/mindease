name: Flutter CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          # flutter-version: '3.19.0' # Optional: Specify version if needed

      - name: Install dependencies
        run: flutter pub get

      - name: Check format
        run: dart format --output=none --set-exit-if-changed .

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Static analysis
      - name: Analyze code
        run: flutter analyze

      # Unit Tests
      - name: Run tests
        run: flutter test

      # Create local.properties (Crucial for Android Build)
      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      # Fix gradlew permission
      - name: Fix gradlew permission
        run: |
          sudo apt-get update
          sudo apt-get install -y dos2unix
          dos2unix android/gradlew
          chmod +x android/gradlew

      - name: Build APK (Production)
        run: flutter build apk --debug --flavor production --target lib/app/main_production.dart
