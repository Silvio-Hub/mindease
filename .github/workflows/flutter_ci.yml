name: Flutter CI

on:
  pull_request:
    branches: ["main"]

  push:
    branches: ["main"]

env:
  FLUTTER_VERSION: "3.35.1"

jobs:
  validate:
    name: Validate (Fast)
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # Cache Pub dependencies
      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # Create .env file
      - name: Create .env file
        run: echo "API_KEY=dummy" > .env

      # Install deps
      - name: Get dependencies
        run: flutter pub get

      # Format check
      - name: Check format
        run: dart format --output=none --set-exit-if-changed .

      # Codegen (incremental)
      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Analyze
      - name: Analyze
        run: flutter analyze

      # Tests (skip if none exist)
      - name: Run tests
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No tests found, skipping"
          fi

  build:
    name: Build APK (Main only)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Java
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Cache Gradle
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # Cache Pub
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # Create .env file
      - name: Create .env file
        run: echo "API_KEY=dummy" > .env

      # Dependencies
      - run: flutter pub get

      # Codegen
      - run: dart run build_runner build --delete-conflicting-outputs

      # Create local.properties (Crucial for Android Build)
      - name: Create local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      # Fix gradlew permission
      - name: Fix gradlew permission
        run: |
          sudo apt-get update
          sudo apt-get install -y dos2unix
          dos2unix android/gradlew
          chmod +x android/gradlew

      # Build APK
      - name: Build APK
        run: flutter build apk --debug --flavor production --target lib/app/main_production.dart

      # Upload artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mindease-apk
          path: build/app/outputs/flutter-apk/*.apk
